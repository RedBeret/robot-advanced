name: Robot Framework Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install robotframework-robocop
      - run: robocop --configure return_status:quality_gate:W=-1:E=0 tests/ || true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install robotframework robotframework-requests pyyaml

      - name: Run CI smoke tests
        run: |
          robot --outputdir results \
            --include ci \
            --exclude browser \
            --exclude docker \
            --exclude database \
            --variablefile config/dev/variables.py \
            tests/

      - name: Run API tests
        run: |
          robot --outputdir results-api \
            --include api \
            --exclude browser \
            tests/ || true

      - name: Run BDD tests
        run: |
          robot --outputdir results-bdd \
            tests/04_bdd_gherkin/ || true

      - name: Run real-world pattern tests
        run: |
          robot --outputdir results-patterns \
            tests/10_real_world/ || true

      - name: Upload all results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-results-py${{ matrix.python-version }}
          path: results*/
